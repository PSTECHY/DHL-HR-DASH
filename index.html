function regionPopup(id){
  const r=_popupData[id];if(!r)return;
  let b=[];
  if(r.inactive>0)b.push({t:r.inactive+' exits this month ('+r.attrRate+'% attrition)',c:parseFloat(r.attrRate)>1.5?'bad':'info'});
  if(r.pActive!=null){const d=r.active-r.pActive;b.push({t:'Headcount '+(d>=0?'grew by +'+d:'dropped by '+d)+' vs last month',c:d>=0?'good':'bad'})}
  if(r.attend<24)b.push({t:'Attendance '+r.attend.toFixed(1)+'d below 24-day threshold',c:'bad'});
  else b.push({t:'Attendance healthy at '+r.attend.toFixed(1)+' days',c:'good'});
  if(r.otPct>10)b.push({t:'OT at '+r.otPct.toFixed(1)+'% CRITICAL',c:'bad'});
  else if(r.otPct>6)b.push({t:'OT at '+r.otPct.toFixed(1)+'% elevated',c:'bad'});
  else b.push({t:'OT controlled at '+r.otPct.toFixed(1)+'%',c:'good'});
  if(parseFloat(r.attrRate)>1.5&&r.ctc<18000)b.push({t:'Low CTC ('+rf(r.ctc)+') likely driving attrition',c:'bad'});
  if(r.pCtc&&r.ctc>r.pCtc)b.push({t:'CTC increased '+rf(r.pCtc)+' → '+rf(r.ctc),c:'good'});
  let action='';
  if(parseFloat(r.attrRate)>1.5)action='<div class="m-action"><b>Action:</b> Exit interviews within 2 weeks. Review compensation.</div>';
  else if(r.otPct>10)action='<div class="m-action"><b>Action:</b> Audit shifts immediately. Add 15-20% temp workforce.</div>';
  openModal(r.name+' — Region Analysis',mRow('Active',fmt(r.active))+mRow('Inactive',r.inactive,r.inactive>0?'var(--r)':'var(--g)')+mRow('Attrition',r.attrRate+'%')+mRow('Avg CTC',rf(r.ctc))+mRow('Attendance',r.attend.toFixed(1)+'d')+mRow('OT%',r.otPct.toFixed(1)+'%')+'<div class="m-section"><h4>Key Findings</h4>'+mBullets(b)+'</div>'+action);
}

function getF(){
  const m=$('fM').value,r=$('fR').value,p=pM[m],rs=r==='all'?regs:[r];
  let tA=0,tI=0,pA=0,pI=0,tC=0,tAt=0,tO=0,cc=0,pC=0,pAt=0,pO=0,pc=0;const rows=[];
  const months=curView==='mtd'?[m]:curView==='qtd'?['jan','feb','mar'].slice(0,['jan','feb','mar'].indexOf(m)+1):['jan','feb','mar'];
  rs.forEach(rg=>{
    let aSum=0,iSum=0,cSum=0,atSum=0,oSum=0,cN=0;
    months.forEach(mo=>{const h=D.headcount[rg]?.[mo],c=D.comp[rg]?.[mo];if(h){aSum=h.a;iSum+=h.i}if(c){cSum+=c.ctc*c.n;atSum+=c.att*c.n;oSum+=c.ot*c.n;cN+=c.n}});
    const ph=p?D.headcount[rg]?.[p]:null,px=p?D.comp[rg]?.[p]:null;
    tA+=aSum;tI+=iSum;if(ph){pA+=ph.a;pI+=ph.i}
    if(cN>0){tC+=cSum;tAt+=atSum;tO+=oSum;cc+=cN}
    if(px){pC+=px.ctc*px.n;pAt+=px.att*px.n;pO+=px.ot*px.n;pc+=px.n}
    const latestH=D.headcount[rg]?.[m],latestC=D.comp[rg]?.[m];
    rows.push({name:rg,active:latestH?.a||0,inactive:iSum,total:(latestH?.a||0)+iSum,attrRate:pct(iSum,(latestH?.a||0)+iSum),ctc:latestC?.ctc||0,attend:latestC?.att||0,otPct:latestC?.ot||0,count:latestC?.n||0,pActive:ph?.a,pInactive:ph?.i,pCtc:px?.ctc,pAttend:px?.att,pOtPct:px?.ot});
  });
  const aC=cc?Math.round(tC/cc):0,aA=cc?(tAt/cc).toFixed(1):0,aO=cc?(tO/cc).toFixed(1):0;
  const pAC=pc?Math.round(pC/pc):0,pAA=pc?(pAt/pc).toFixed(1):0,pAO=pc?(pO/pc).toFixed(1):0;
  return{m,p,r,totalA:tA,totalI:tI,prevA:pA,prevI:pI,avgCTC:aC,avgAtt:aA,avgOT:aO,pAvgCTC:pAC,pAvgAtt:pAA,pAvgOT:pAO,g:D.gender[m],pg:p?D.gender[p]:null,ga:D.gAttr[m],regRows:rows,cCount:cc,months};
}

function rGEO(F){
  const{totalA,totalI,regRows,avgCTC,pAvgCTC}=F;

  cards.push('<div class="ins" style="border-left-color:#C62828"><div class="ins-t">❹ OT-Burnout-Attrition Spiral — "West 2 Case Study"</div><div class="ins-p" style="line-height:2"><b>Finding:</b> West 2 OT surged from <b>9.8% (Jan) → 10.3% (Feb) → 16.8% (Mar)</b> — now at <b>3.4x the 5% threshold</b>. Agency Avadhoot (941 employees) runs at 11.3% OT. UNH Mgmt attendance is worst at 22.6 days.<br><br><b>Why it\'s a spiral:</b> When employees leave → remaining staff absorbs their workload → OT increases → more burnout → more exits → even more OT. This is a <b>self-reinforcing death spiral</b>. West 2 headcount dropped from 2,012 (Jan) to 1,864 (Mar) while workload stayed constant.<br><br><b>Financial impact:</b> At OT premium rates, West 2\'s excess OT costs approximately <b>₹'+(Math.round((w2Comp?.n||0)*(w2Comp?.ctc||0)*0.168*0.5/100000))+ ' Lakhs/month</b> in overtime wages alone — on top of the attrition replacement cost.<br><br><b style="color:var(--g)">Break the cycle:</b> Immediate 15-20% temp workforce injection. Cap OT at 10% with escalation protocol. Redistribute shifts. Audit Avadhoot\'s workforce planning. 30-day target: OT below 10%.</div></div>');

  // Cause 5: Karnataka Concentration Risk
  cards.push('<div class="ins" style="border-left-color:var(--p)"><div class="ins-t">❺ Karnataka Concentration Risk — "Single-State Dependency"</div><div class="ins-p" style="line-height:2"><b>Finding:</b> Karnataka alone had <b>'+karQ1+' exits in Q1</b> — that\'s <b>'+Math.round(karQ1/q1I*100)+'% of all India exits from one state</b>. Maharashtra follows at '+(((D.stAttr.jan['Maharashtra']||0)+(D.stAttr.feb['Maharashtra']||0)+(D.stAttr.mar['Maharashtra']||0)))+' exits. Together, 2 states account for <b>'+Math.round(((karQ1+(D.stAttr.jan['Maharashtra']||0)+(D.stAttr.feb['Maharashtra']||0)+(D.stAttr.mar['Maharashtra']||0))/q1I)*100)+'% of all exits</b>.<br><br><b>Why Karnataka:</b> Bangalore is India\'s hottest logistics labor market — Amazon, Flipkart, Meesho, Zepto all competing for the same warehouse workforce within 10km radius. <b>Wage inflation in Bangalore logistics is 12-15% YoY</b> while our CTC increase was ~5%. We\'re losing the talent war on price.<br><br><b style="color:var(--g)">Action:</b> Karnataka-specific retention allowance (₹1,000-1,500/month). Tie-up with local ITIs for pipeline. Consider Tier-2 city expansion (Mysore, Hubli) where labor cost is 20-25% lower.</div></div>');

  // ===== SECTION 2: STRATEGIC INSIGHTS =====
  cards.push('<div class="ins c3" style="border-left-color:var(--b);background:linear-gradient(135deg,#F5F9FF,#E8F0FE)"><div class="ins-t" style="font-size:14px;color:var(--b)">💡 STRATEGIC INSIGHTS — Opportunities Hidden in the Data</div><div class="ins-p" style="line-height:2">Beyond the problems, this data reveals <b>four strategic opportunities</b> that can transform our workforce metrics.</div></div>');

  // Insight 1: Gender = Retention
  cards.push('<div class="ins" style="border-left-color:var(--g)"><div class="ins-t">💚 Female Workforce = Better Retention</div><div class="ins-p" style="line-height:2"><b>Finding:</b> Female participation grew from <b>18.4% (Jan: 3,120) → 20.5% (Mar: 3,429)</b>, a +2.1pp gain. But here\'s the key insight: <b>Female Q1 attrition rate is '+femAttrR+'%</b> vs <b>Male attrition rate '+maleAttrR+'%</b>. Females had '+femAttrQ1+' exits vs Males '+maleAttrQ1+' exits in Q1.<br><br><b>Why:</b> In warehouse logistics, female employees show <b>higher attendance consistency, lower OT dependency, and stronger team cohesion</b>. Industry data shows female warehouse workers have 15-25% lower attrition than males in similar roles.<br><br><b style="color:var(--g)">Opportunity:</b> Every 5pp increase in female ratio could reduce overall attrition by 0.3-0.5pp. Target: <b>25% female by Dec 2026</b>. ROI: ~₹40-60 Lakhs saved in reduced replacement costs annually. Invest in: female-friendly facilities, creche partnerships, women-only shifts, referral bonuses for female hires.</div></div>');

  // Insight 2: Agency Governance
  cards.push('<div class="ins" style="border-left-color:var(--b)"><div class="ins-t">📋 Agency Scorecard — ₹16.7K Gap Means Zero Governance</div><div class="ins-p" style="line-height:2"><b>Finding:</b> Across 15 agencies, CTC ranges from <b>'+botAgCTC[0]+' at '+rf(botAgCTC[1].ctc)+'</b> to <b>'+topAgCTC[0]+' at '+rf(topAgCTC[1].ctc)+'</b> — a <b>'+(topAgCTC[1].ctc/botAgCTC[1].ctc).toFixed(1)+'x gap</b>. Weighted average CTC: <b>'+rf(agAvgCTC)+'</b>.<br><br><b>Performance paradox:</b> UGRO (₹18,093 CTC) has the <b>best attendance at 28.5 days and lowest OT at 2.3%</b>. Avadhoot (₹19,461) has <b>worst OT at 11.3%</b>. Higher CTC ≠ better performance. The correlation is with <b>agency management quality</b>, not price.<br><br><b>Why it matters:</b> If we brought the bottom 5 agencies up to median attendance (25.8d), we\'d gain <b>~12,000 productive person-days per month</b>.<br><br><b style="color:var(--g)">Action:</b> Quarterly agency scorecard (CTC, Attendance, OT, Attrition, BGV). Bottom-2 agencies on 90-day improvement plan. Consolidate from 15 to 10-12 agencies. Negotiate volume-based CTC bands.</div></div>');

  // Insight 3: Material Handler Pay Compression
  cards.push('<div class="ins" style="border-left-color:var(--p)"><div class="ins-t">⚠️ Material Handler Pay Compression — "66% Stuck at ₹17K"</div><div class="ins-p" style="line-height:2"><b>Finding:</b> <b>11,090 employees (66% of total workforce)</b> are Material Handlers earning ₹17,164. The next role up — Data Entry Op — earns ₹23,272 (+36%). Fork Lift Op earns ₹23,828 (+39%). <b>There is no intermediate step.</b><br><br><b>Why it drives attrition:</b> A Material Handler sees <b>zero career progression</b> unless they make a massive role jump. After 6-12 months at ₹17K with no visible upward path, they leave for a ₹500-1,000 increment at a competitor. It\'s not the money — it\'s the <b>absence of hope</b>.<br><br><b style="color:var(--g)">Fix:</b> Create <b>3-tier progression</b>: Handler L1 (₹17K) → Handler L2 (₹19K, after 6 months + skill cert) → Senior Handler (₹21K, after 12 months + MHE training). Cost: ~₹2K avg increase × 11,090 = ₹2.2 Cr/year. But saving just 800 exits/year saves ₹5 Cr in replacement. <b>Net savings: ₹2.8 Cr/year.</b></div></div>');

  // Insight 4: Predictable Attrition Pattern
  cards.push('<div class="ins" style="border-left-color:#00695C"><div class="ins-t">📈 Attrition is Seasonal & Predictable — "Q4 is the Intervention Window"</div><div class="ins-p" style="line-height:2"><b>Finding:</b> Q1 data shows a clear pattern: <b>Jan ('+janI+') → Feb ('+febI+') → Mar ('+marI+')</b>. The March spike is <b>not a surprise</b> — it follows India\'s fiscal year-end cycle every year.<br><br><b>Prediction model:</b> Based on Q1 patterns, we can forecast:<br>• <b>Q2 (Apr-Jun):</b> Attrition will <b>drop 20-30%</b> — new joiners from April hiring, market settles.<br>• <b>Q3 (Jul-Sep):</b> Stable period. Best time for training investments.<br>• <b>Q4 (Oct-Dec):</b> <b>The intervention window</b>. This is when retention actions must be deployed BEFORE the Jan-Mar exit wave.<br><br><b style="color:var(--g)">Action for Q4 2026:</b> December retention bonuses (conditional on staying till March). January promotion cycle (before competitors send offers). February "stay interviews" for top 20% performers and anyone in &lt;1yr tenure in high-attrition regions.</div></div>');

  } // end if r==='all'

  // ===== SECTION 3: SCORECARDS =====
  // Dynamic region-specific insight when filtered
  if(F.r!=='all' && hot){
    const rComp=D.comp[F.r]?.[m];
    cards.push('<div class="ins c3" style="border-left-color:var(--yel)"><div class="ins-t">🔎 Region Deep-Dive: '+F.r+'</div><div class="ins-p" style="line-height:2"><b>Headcount:</b> '+fmt(hot.active)+' active, '+hot.inactive+' exits ('+hot.attrRate+'% attrition).<br><b>Compensation:</b> CTC '+rf(hot.ctc)+(hot.ctc<avgCTC?' <span style="color:var(--red)">(below company avg '+rf(avgCTC)+')</span>':' <span style="color:var(--g)">(above company avg '+rf(avgCTC)+')</span>')+'<br><b>Attendance:</b> '+hot.attend.toFixed(1)+'d '+(hot.attend<24?'<span style="color:var(--red)">⚠ below 24d threshold</span>':'<span style="color:var(--g)">✓ healthy</span>')+'<br><b>OT:</b> '+hot.otPct.toFixed(1)+'% '+(hot.otPct>10?'<span style="color:var(--red)">⚠ CRITICAL</span>':hot.otPct>5?'<span style="color:var(--o)">elevated</span>':'<span style="color:var(--g)">✓ controlled</span>')+'</div></div>');
  }

  // Strengths & Concerns
  cards.push('<div class="sum-card"><h4 style="color:var(--g)">✅ Strengths</h4>'+[
    ['Female ratio growing',fP+'% (+2.1pp)'],
    ['Overall monthly attrition',aR+'%'],
    ['East region stability','6 exits in Q1'],
    ['March attendance','25.4 days avg'],
    ['BGV compliance','94% verified'],
    ['UGRO agency performance','28.5d attend, 2.3% OT']
  ].map(x=>'<div class="sr"><span class="sr-l">'+x[0]+'</span><span class="sr-v" style="color:var(--g)">'+x[1]+'</span></div>').join('')+'</div>');

  cards.push('<div class="sum-card"><h4 style="color:var(--r)">🚨 Critical Concerns</h4>'+[
    ['South1 Q1 exits',s1Exits+' ('+Math.round(s1Exits/q1I*100)+'% of all)'],
    ['West 2 OT','16.8% (3.4x limit)'],
    ['<1yr tenure workforce','63% (10,654)'],
    ['Agency CTC gap',(topAgCTC[1].ctc/botAgCTC[1].ctc).toFixed(1)+'x'],
    ['March exit spike','+'+Math.round((marI-febI)/febI*100)+'% MoM'],
    ['Handler pay compression','₹17K (66% stuck)'],
    ['Karnataka concentration',karQ1+' exits ('+Math.round(karQ1/q1I*100)+'%)'],
    ['Q1 replacement cost','₹'+Math.round(replCost/10000000).toFixed(1)+' Cr']
  ].map(x=>'<div class="sr"><span class="sr-l">'+x[0]+'</span><span class="sr-v" style="color:var(--r)">'+x[1]+'</span></div>').join('')+'</div>');

  // ===== SECTION 4: ACTION PLAN =====
  cards.push('<div class="ins c3" style="border-left-color:var(--red);background:linear-gradient(135deg,#FFFDF5,#FFF8E1)"><div class="ins-t" style="font-size:14px;color:var(--red)">🎯 CHRO ACTION PLAN — '+mName+' 2026</div><div class="ins-p" style="line-height:2.2"><b style="color:var(--red)">THIS WEEK (Immediate):</b><br>• South1 exit interviews — identify top 3 reasons for Karnataka exits<br>• West 2 OT cap at 12% — escalate any breach to Regional Head<br>• Agency Avadhoot review meeting — 11.3% OT is unacceptable<br><br><b style="color:var(--o)">THIS MONTH (30 days):</b><br>• South1 CTC benchmarking vs Bangalore market — propose ₹1,500 correction<br>• Launch 30-60-90 onboarding program for all new hires in &lt;1yr cohort<br>• Agency scorecard v1 — rank all 15 agencies on CTC/Attend/OT/Attrition<br>• West 2 temp workforce injection — 200 temps to break OT spiral<br><br><b style="color:var(--b)">THIS QUARTER (Q2 2026):</b><br>• Material Handler career pathway (L1→L2→Senior) — pilot in South1<br>• Female hiring target: reach 22% by Jun (from 20.5%)<br>• Agency consolidation plan: 15 → 12 agencies<br>• Karnataka retention allowance — ₹1,000/month for BLR warehouses<br>• Predictive attrition model — flag employees with >70% exit probability<br><br><b style="color:var(--g)">TARGET OUTCOMES (by Dec 2026):</b><br>• Monthly attrition: 1.2% → <b>0.8%</b><br>• Female ratio: 20.5% → <b>25%</b><br>• OT: no region above <b>8%</b><br>• &lt;1yr attrition: 17% → <b>10%</b><br>• Estimated annual saving: <b>₹8-12 Cr</b></div></div>');

  $('pg-in').innerHTML=cards.join('');
}

function rSR(){
  const items=[
    ...Object.entries(D.wh).map(([w,n])=>({type:'Warehouse',name:w,detail:fmt(n)+' emp',fn:()=>{const id=storePopup({_name:w,cnt:n,tA:Object.values(D.wh).reduce((s,v)=>s+v,0)});whPopup(id)}})),
    ...Object.entries(D.ag).map(([a,v])=>({type:'Agency',name:a,detail:fmt(v.n)+' | '+rf(v.ctc),fn:()=>{const id=storePopup({...v,_name:a});agencyPopup(id)}})),
    ...regs.map(r=>({type:'Region',name:r,detail:'HC: '+fmt(D.headcount[r]?.mar?.a||0),fn:()=>{$('fR').value=r;R()}})),
    ...Object.entries(D.sector).map(([s,v])=>({type:'Sector',name:s,detail:fmt(v.n)+' | '+rf(v.ctc),fn:()=>setCross('sector',s)})),
    ...Object.entries(D.desig).map(([d,v])=>({type:'Designation',name:d,detail:fmt(v.n)+' | '+rf(v.ctc),fn:()=>{const id=storePopup({...v,_name:d});desigPopup(id)}}))
  ];
  $('pg-sr').innerHTML='<div class="search-wrap"><input class="search-input" id="sBox" type="text" placeholder="Search warehouses, agencies, regions, sectors, designations..." oninput="doS()"><div class="search-results" id="sRes"></div></div>';
  window._si=items;doS();
}
function doS(){
  const q=($('sBox')?.value||'').toLowerCase();
  const items=(window._si||[]).filter(i=>!q||i.name.toLowerCase().includes(q)||i.type.toLowerCase().includes(q)).slice(0,20);
  $('sRes').innerHTML=items.map(it=>'<div class="search-item" onclick="window._si['+window._si.indexOf(it)+'].fn()"><h4>'+it.name+' <span style="color:var(--t3);font-weight:500;font-size:10px">| '+it.type+'</span></h4><p>'+it.detail+'</p></div>').join('')||'<p style="color:var(--t3);padding:20px;text-align:center">No results</p>';
}
R();
</script>
