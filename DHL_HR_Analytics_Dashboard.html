function regionPopup(r){

  if(r.otPct>10)b.push({t:`OT at ${r.otPct.toFixed(1)}% is CRITICAL — severe understaffing, immediate hiring needed`,c:'bad'});

function agencyPopup(name,v){
  const avgCtc=18500,avgAtt=25.5,avgOT=6.5;
  let b=[],rating='Average';
  if(v.ctc>25000){b.push({t:`Premium pricing — CTC ${rf(v.ctc)} is ${Math.round((v.ctc/avgCtc-1)*100)}% above company avg`,c:'info'});rating='Premium'}
  else if(v.ctc<17000){b.push({t:`Budget agency — CTC ${rf(v.ctc)} is ${Math.round((1-v.ctc/avgCtc)*100)}% below avg, quality risk`,c:'bad'});rating='Budget'}
  else b.push({t:`CTC ${rf(v.ctc)} is in line with company average`,c:'good'});
  if(v.att>27){b.push({t:`Top-tier attendance at ${v.att}d — workers are engaged`,c:'good'});if(rating==='Average')rating='Strong'}
  else if(v.att<23){b.push({t:`Poor attendance ${v.att}d — ${Math.round((1-v.att/avgAtt)*100)}% below avg, workers may be disengaged`,c:'bad'});rating='Weak'}
  if(v.ot>10)b.push({t:`OT ${v.ot}% is dangerously high — workers overloaded, burnout risk`,c:'bad'});
  else if(v.ot<3)b.push({t:`OT ${v.ot}% is very low — efficient workforce management`,c:'good'});
  const cpd=Math.round(v.ctc/v.att);
  b.push({t:`Effective cost per productive day: ${rf(cpd)}`,c:'info'});

  let action='';

  else if(v.att<23)action=`<div class="m-action"><b>Performance Warning:</b> Issue formal attendance improvement notice. Set 25-day target for next quarter.</div>`;
  else if(v.ctc>30000)action=`<div class="m-action"><b>Cost Optimization:</b> Premium pricing justified only if attendance >28d. Current ${v.att}d — evaluate ROI before renewal.</div>`;

function whPopup(name,cnt,tA){

  if(name.includes('Zepto'))b.push({t:`Quick-commerce operations — expect 15-20% monthly churn. Build buffer staffing model`,c:'info'});
  if(name.includes('Puma')||name.includes('ABFRL')||name.includes('Skechers'))b.push({t:`Fashion/retail client — plan for seasonal ramp-up/down cycles`,c:'info'});
  if(name.includes('Amazon'))b.push({t:`Amazon operations — high volume, strict SLAs. Attendance management is critical`,c:'info'});

  rs.forEach(rg=>{

}

  ch.g2=new Chart($('g2'),{type:'doughnut',data:{labels:zE.map(e=>e[0]),datasets:[{data:zE.map(e=>e[1]),backgroundColor:['#DC2626','#2563EB','#16A34A','#EA580C'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'45%',plugins:{legend:{position:'right',labels:{font:{size:10}}},datalabels:{display:true,color:'#fff',font:{size:11,weight:'800'},formatter:(v,ctx)=>Math.round(v/ctx.dataset.data.reduce((a,b)=>a+b,0)*100)+'%'}}}});
}

// ========== CLIENTS & AGENCIES ==========
function rCA(F){
  const{totalA}=F;
  const sE=Object.entries(D.sector).sort((a,b)=>b[1]-a[1]),aE=Object.entries(D.ag).sort((a,b)=>b[1].n-a[1].n),dE=Object.entries(D.desig).sort((a,b)=>b[1].n-a[1].n);
  const secTbl=sE.map(([s,n])=>`<tr ${xF?.type==='sector'&&xF.value===s?'style="background:#FEF2F2"':''} onclick="setCross('sector','${s}')"><td>${s}</td><td class="num">${fmt(n)}</td><td class="num">${pct(n,totalA)}%</td></tr>`).join('');
  const agTbl=aE.map(([a,v])=>`<tr onclick="agencyPopup('${a.replace(/'/g,"\\'")}',${JSON.stringify(v)})"><td>${a}</td><td class="num">${fmt(v.n)}</td><td class="num">${rf(v.ctc)}</td><td class="num">${v.att}</td><td class="num ${v.ot>10?'hi':''}">${v.ot}%</td></tr>`).join('');
  const desTbl=dE.map(([d,v])=>`<tr onclick="desigPopup('${d.replace(/'/g,"\\'")}',${JSON.stringify(v)})" style="cursor:pointer"><td>${d}</td><td class="num">${fmt(v.n)}</td><td class="num">${rf(v.ctc)}</td></tr>`).join('');

  const topAg=aE[0],topSec=sE[0],topWh=Object.entries(D.wh).sort((a,b)=>b[1]-a[1])[0];
  const minCTC=Math.min(...aE.map(e=>e[1].ctc)),maxCTC=Math.max(...aE.map(e=>e[1].ctc));
  $('pg-ca').innerHTML=`
    ${K('Agencies',Object.keys(D.ag).length,'kt','Staffing partners','nt')}
    ${K('Largest',topAg[0],'kr',fmt(topAg[1].n)+' employees','nt')}
    ${K('Sectors',Object.keys(D.sector).length,'kg','Client sectors','nt')}
    ${K('Top Sector',topSec[0],'ko',fmt(topSec[1])+' employees','nt')}
    ${K('Top Site',topWh[0],'kb',fmt(topWh[1])+' employees','nt')}
    ${K('CTC Range','₹'+Math.round(minCTC/1000)+'K–₹'+Math.round(maxCTC/1000)+'K','kp',(maxCTC/minCTC).toFixed(1)+'x agency gap','nt')}
    <div class="cd c3"><div class="cd-h"><span class="cd-t">Agency Performance</span><span class="cd-tag" style="background:#FEE2E2;color:var(--red)">CLICK ROW FOR SCORECARD</span></div><div class="tbl-wrap"><table class="dt"><thead><tr><th>Agency</th><th>HC</th><th>CTC</th><th>Attend</th><th>OT%</th></tr></thead><tbody>${agTbl}</tbody></table></div></div>
    <div class="cd c3"><div class="cd-h"><span class="cd-t">Agency CTC Comparison</span></div><div class="cd-b"><canvas id="ca1"></canvas></div></div>
    <div class="cd c3"><div class="cd-h"><span class="cd-t">Sector Breakdown</span><span class="cd-tag" style="background:#FEE2E2;color:var(--red)">CLICK</span></div><div class="tbl-wrap"><table class="dt"><thead><tr><th>Sector</th><th>HC</th><th>Share</th></tr></thead><tbody>${secTbl}</tbody></table></div></div>
    <div class="cd c3"><div class="cd-h"><span class="cd-t">Designation Breakdown</span><span class="cd-tag" style="background:#FEE2E2;color:var(--red)">CLICK ROW</span></div><div class="tbl-wrap"><table class="dt"><thead><tr><th>Designation</th><th>Count</th><th>CTC</th></tr></thead><tbody>${desTbl}</tbody></table></div></div>`;

  const t10=aE.slice(0,10);
  ch.ca1=new Chart($('ca1'),{type:'bar',data:{labels:t10.map(e=>e[0]),datasets:[{data:t10.map(e=>e[1].ctc),backgroundColor:t10.map(e=>e[1].ctc>25000?'#DC2626':e[1].ctc<17000?'#EA580C':'#2563EB')}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:true,color:'#374151',font:{size:8,weight:'700'},anchor:'end',align:'right',formatter:v=>rf(v)}},scales:{x:{grid:{color:'#F1F5F9'},ticks:{callback:v=>'₹'+Math.round(v/1000)+'K',font:{size:8}}},y:{grid:{display:false},ticks:{font:{size:8}}}}}});
}

// ========== COMPLIANCE ==========
function rCOMP(F){
  const{m,p,avgCTC,pAvgCTC,regRows}=F;
  const cC=chS(avgCTC,p?pAvgCTC:null),aC=chS(parseFloat(F.avgAtt),p?parseFloat(F.pAvgAtt):null),oC=chS(parseFloat(F.avgOT),p?parseFloat(F.pAvgOT):null,true);
  const oH=[...regRows].sort((a,b)=>b.otPct-a.otPct)[0];
  const attTbl=regRows.filter(r=>r.count>0).sort((a,b)=>b.attend-a.attend).map(r=>`<tr onclick='regionPopup(${JSON.stringify(r).replace(/'/g,"\\'")})'><td>${r.name}</td><td class="num">${fmt(r.count)}</td><td class="num ${r.attend<23?'hi':''}">${r.attend.toFixed(1)}</td><td class="num">${r.pAttend!=null?r.pAttend.toFixed(1):'—'}</td><td class="num ${r.otPct>10?'hi':''}">${r.otPct.toFixed(1)}%</td><td class="num">${r.pOtPct!=null?r.pOtPct.toFixed(1)+'%':'—'}</td></tr>`).join('');

  $('pg-comp').innerHTML=`
    ${K('Avg CTC',rf(avgCTC),'kt',cC.t,cC.c)}
    ${K('Avg Attendance',F.avgAtt+'d','kg',aC.t,aC.c)}
    ${K('Avg OT',F.avgOT+'%','ko',oC.t,oC.c)}
    ${K('OT Hotspot',oH?oH.name:'—','kr',oH?oH.otPct.toFixed(1)+'%':'','dn')}
    ${K('Wage Records',fmt(F.cCount),'kb','Current month','nt')}
    ${K('BGV','94%','kp','Verified','nt')}
    <div class="cd c3"><div class="cd-h"><span class="cd-t">Region Attendance & OT</span><span class="cd-tag" style="background:#FEE2E2;color:var(--red)">CLICK ROW</span></div><div class="tbl-wrap"><table class="dt"><thead><tr><th>Region</th><th>HC</th><th>Attend</th><th>Prev</th><th>OT%</th><th>Prev OT</th></tr></thead><tbody>${attTbl}</tbody></table></div></div>
    <div class="cd c3"><div class="cd-h"><span class="cd-t">OT% by Region — Q1</span></div><div class="cd-b"><canvas id="co1"></canvas></div></div>
    <div class="cd c3"><div class="cd-h"><span class="cd-t">CTC by Region</span></div><div class="cd-b"><canvas id="co2"></canvas></div></div>
    <div class="cd c3"><div class="cd-h"><span class="cd-t">Attendance Trend</span></div><div class="cd-b"><canvas id="co3"></canvas></div></div>`;

  const cRegs=F.r==='all'?mR:[F.r].filter(r=>mR.includes(r));
  ch.co1=new Chart($('co1'),{type:'bar',data:{labels:cRegs,datasets:[{label:'Jan',data:cRegs.map(r=>D.comp[r]?.jan?.ot||0),backgroundColor:'#2563EB'},{label:'Feb',data:cRegs.map(r=>D.comp[r]?.feb?.ot||0),backgroundColor:'#EA580C'},{label:'Mar',data:cRegs.map(r=>D.comp[r]?.mar?.ot||0),backgroundColor:'#DC2626'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'},datalabels:{...dlInside,font:{size:7,weight:'700'},formatter:v=>v.toFixed(1)+'%'}},scales:{x:{grid:{display:false},ticks:{font:{size:8}}},y:{grid:{color:'#F1F5F9'}}}}});

  const cR=F.regRows.filter(r=>r.ctc>0).sort((a,b)=>b.ctc-a.ctc);
  const ds=[{label:mn[m],data:cR.map(r=>r.ctc),backgroundColor:'#D40511'}];
  if(F.p)ds.push({label:mn[F.p],data:cR.map(r=>r.pCtc||0),backgroundColor:'#2563EB'});
  ch.co2=new Chart($('co2'),{type:'bar',data:{labels:cR.map(r=>r.name),datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'},datalabels:{...dlInside,font:{size:7,weight:'700'},formatter:v=>v?'₹'+Math.round(v/1000)+'K':''}},scales:{x:{grid:{display:false},ticks:{font:{size:8}}},y:{grid:{color:'#F1F5F9'},ticks:{callback:v=>'₹'+Math.round(v/1000)+'K',font:{size:8}}}}}});

  ch.co3=new Chart($('co3'),{type:'line',data:{labels:cRegs,datasets:[{label:'Jan',data:cRegs.map(r=>D.comp[r]?.jan?.att||0),borderColor:'#2563EB',backgroundColor:'#2563EB',tension:.3,pointRadius:4,borderWidth:2.5},{label:'Feb',data:cRegs.map(r=>D.comp[r]?.feb?.att||0),borderColor:'#EA580C',backgroundColor:'#EA580C',tension:.3,pointRadius:4,borderWidth:2.5},{label:'Mar',data:cRegs.map(r=>D.comp[r]?.mar?.att||0),borderColor:'#16A34A',backgroundColor:'#16A34A',tension:.3,pointRadius:4,borderWidth:2.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'},datalabels:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:8}}},y:{grid:{color:'#F1F5F9'}}}}});
}

// ========== INSIGHTS (DYNAMIC — changes with filters) ==========
function rIN(F){
  const{m,totalA,totalI,regRows,avgCTC,avgAtt,avgOT,g}=F;
  const total=totalA+totalI,aR=pct(totalI,total);
  const hot=regRows.filter(r=>r.inactive>0).sort((a,b)=>b.inactive-a.inactive)[0];
  const otHot=[...regRows].sort((a,b)=>b.otPct-a.otPct)[0];
  const fP=pct(g.F,g.M+g.F);
  const mName={jan:'January',feb:'February',mar:'March'}[m];
  const rName=F.r==='all'?'All Regions':F.r;

  // Build dynamic insights based on current filter
  let cards=[];
  cards.push(`<div class="ins" style="border-left-color:var(--tl)"><div class="ins-t">Current View: ${mName} &#183; ${rName}</div><div class="ins-p"><b>${fmt(totalA)}</b> active employees, <b>${fmt(totalI)}</b> exits (${aR}% attrition). Avg CTC <b>${rf(avgCTC)}</b>, Attendance <b>${F.avgAtt}d</b>, OT <b>${F.avgOT}%</b>. Female ratio <b>${fP}%</b>.</div></div>`);

  if(hot&&hot.inactive>5)cards.push(`<div class="ins" style="border-left-color:var(--r)"><div class="ins-t">Attrition Alert: ${hot.name}</div><div class="ins-p"><b>${hot.inactive} exits</b> (${hot.attrRate}% rate) — highest in current view. ${parseFloat(hot.attrRate)>1.5?'This exceeds the 1.5% threshold. Immediate exit interviews needed.':'Within acceptable range but monitor closely.'} ${hot.ctc<18000?'Low CTC ('+rf(hot.ctc)+') may be contributing.':''}</div></div>`);

  if(otHot&&otHot.otPct>6)cards.push(`<div class="ins" style="border-left-color:var(--o)"><div class="ins-t">OT Warning: ${otHot.name} at ${otHot.otPct.toFixed(1)}%</div><div class="ins-p">${otHot.otPct>10?'<b>CRITICAL</b> — 3x healthy threshold. Workers are overloaded. Hire additional staff within 2 weeks or risk burnout and quality issues.':'<b>Elevated</b> — above 5% target. Review shift planning and consider adding 10-15% buffer staffing.'}</div></div>`);

  if(F.r==='all'){
    cards.push(`<div class="ins" style="border-left-color:var(--r)"><div class="ins-t">South1 Attrition Crisis</div><div class="ins-p">South1 = <b>42-67% of all exits</b> every month. Karnataka: 88 exits in March. CTC ₹16,753 is lowest among major regions — compensation is the primary attrition driver. <b>Action:</b> Benchmark CTC against local market, implement retention bonus.</div></div>`);
    cards.push(`<div class="ins" style="border-left-color:var(--o)"><div class="ins-t">63% Workforce Has &lt;1yr Tenure</div><div class="ins-p"><b>10,654 of 16,947</b> employees joined within the last year. 48.6% of exits also happen in year 1. This signals onboarding failure. <b>Action:</b> Launch 30-60-90 day check-in program with buddy system at top 10 sites.</div></div>`);
    cards.push(`<div class="ins" style="border-left-color:var(--o)"><div class="ins-t">West 2 OT Surged 9.8% &#8594; 16.8%</div><div class="ins-p">Q1 OT escalation is <b>3x the 5% healthy threshold</b>. Avadhoot agency OT at 11.3%. If unchecked, expect increased attrition and safety incidents. <b>Action:</b> Emergency staffing audit, cap OT at 10% within 30 days.</div></div>`);
    cards.push(`<div class="ins" style="border-left-color:var(--g)"><div class="ins-t">Female Growth: 18.4% &#8594; 20.5%</div><div class="ins-p">Female share rose by <b>+2.1pp</b> (3,120&#8594;3,429) while total HC declined. Strong diversity progress driven by South1 and West 1 hiring. <b>Target:</b> 25% by FY26-end — need ~750 more female hires.</div></div>`);
    cards.push(`<div class="ins" style="border-left-color:var(--b)"><div class="ins-t">Agency Cost Gap: 2.1x</div><div class="ins-p">Dedha India HR charges <b>₹32,298</b> vs Needs Manpower at <b>₹15,606</b>. But Dedha delivers 29.4d attendance vs Needs at 22.8d. Cost per productive day: Dedha ₹1,099 vs Needs ₹685. <b>Action:</b> Build standardized scorecard for renewals — don't just look at CTC.</div></div>`);
    cards.push(`<div class="ins" style="border-left-color:var(--p)"><div class="ins-t">Material Handler Pay Risk</div><div class="ins-p"><b>11,090 employees (66%)</b> are Material Handlers earning ₹17,164 — lowest paid role. Executive CTC is 2.3x higher at ₹38,691. Any market competitor offering ₹500 more will poach talent. <b>Action:</b> Create upskilling pathway to Reach Truck/Fork Lift roles (+₹6K-9K CTC).</div></div>`);
    cards.push(`<div class="ins" style="border-left-color:var(--r)"><div class="ins-t">March Exit Spike: +56%</div><div class="ins-p">Exits jumped <b>132&#8594;206</b> (Feb&#8594;Mar). West 1 doubled (27&#8594;62), South3 went 0&#8594;19. March-end contract cycles and appraisal-season attrition likely factors. <b>Action:</b> Pre-emptive retention conversations in Feb for next year.</div></div>`);
  }

  cards.push(`<div class="sum-card"><h4 style="color:var(--g)">Strengths</h4>${[['Female participation','+2.1pp'],['Overall attrition','1.2%'],['East stability','0.1% attr'],['March attend recovery','25.4d'],['BGV compliance','94%']].map(([l,v])=>`<div class="sr"><span class="sr-l">${l}</span><span class="sr-v" style="color:var(--g)">${v}</span></div>`).join('')}</div>`);
  cards.push(`<div class="sum-card"><h4 style="color:var(--r)">Concerns</h4>${[['South1 attrition','2.2%'],['West 2 OT','16.8%'],['<1yr workforce','63%'],['Agency cost gap','2.1x'],['Mar exit spike','+56%'],['Handler pay','₹17K']].map(([l,v])=>`<div class="sr"><span class="sr-l">${l}</span><span class="sr-v" style="color:var(--r)">${v}</span></div>`).join('')}</div>`);

  cards.push(`<div class="ins c3" style="border-left-color:var(--red)"><div class="ins-t">Action Plan for ${mName}</div><div class="ins-p"><b>This Week:</b> ${hot?hot.name+' exit interviews':'Monitor attrition'} &#183; ${otHot&&otHot.otPct>6?otHot.name+' OT audit':'OT check'} &#183; Agency scorecard draft<br><b>This Month:</b> 30-60-90 onboarding program &#183; Compensation benchmarking &#183; Buddy system pilot at top 5 sites<br><b>This Quarter:</b> Female hiring target 25% &#183; Predictive attrition model &#183; Agency consolidation 15&#8594;8-10 &#183; Handler upskilling program</div></div>`);

  $('pg-in').innerHTML=cards.join('');
}

// ========== SEARCH ==========
function rSR(){
  const items=[
    ...Object.entries(D.wh).map(([w,n])=>({type:'Warehouse',name:w,detail:fmt(n)+' employees',fn:()=>{const tA=Object.values(D.wh).reduce((s,v)=>s+v,0);whPopup(w,n,tA)}})),
    ...Object.entries(D.ag).map(([a,v])=>({type:'Agency',name:a,detail:fmt(v.n)+' emp &#183; '+rf(v.ctc),fn:()=>agencyPopup(a,v)})),
    ...regs.map(r=>({type:'Region',name:r,detail:'HC: '+fmt(D.headcount[r]?.mar?.a||0),fn:()=>{$('fR').value=r;R()}})),
    ...Object.entries(D.sector).map(([s,n])=>({type:'Sector',name:s,detail:fmt(n)+' emp',fn:()=>setCross('sector',s)})),
    ...Object.entries(D.desig).map(([d,v])=>({type:'Designation',name:d,detail:fmt(v.n)+' emp &#183; '+rf(v.ctc),fn:()=>desigPopup(d,v)}))
  ];
  $('pg-sr').innerHTML=`<div class="search-wrap"><input class="search-input" id="sBox" type="text" placeholder="Search warehouses, agencies, regions, sectors, designations..." oninput="doS()"><div class="search-results" id="sRes"></div></div>`;
  window._si=items;doS();
}
function doS(){
  const q=($('sBox')?.value||'').toLowerCase();
  const items=(window._si||[]).filter(i=>!q||i.name.toLowerCase().includes(q)||i.type.toLowerCase().includes(q)).slice(0,20);
  $('sRes').innerHTML=items.map(it=>`<div class="search-item" onclick="window._si[${window._si.indexOf(it)}].fn()"><h4>${it.name} <span style="color:var(--t3);font-weight:500;font-size:10px">&#183; ${it.type}</span></h4><p>${it.detail}</p></div>`).join('')||'<p style="color:var(--t3);padding:20px;text-align:center">No results</p>';
}

R();
</script>
